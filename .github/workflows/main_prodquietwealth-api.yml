name: Deploy Production Backend ASP.Net Core app to Azure Web App - prodquietwealth-api

on:
  workflow_run:
    workflows:
      - CI Backend
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod-api
  cancel-in-progress: false

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.event.workflow_run.head_sha }}

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore backend project
        run: dotnet restore server/QuietWealth.Backend/QuietWealth.Backend.csproj

      - name: Build backend
        run: dotnet build server/QuietWealth.Backend/QuietWealth.Backend.csproj --configuration Release --no-restore

      - name: Publish backend
        run: dotnet publish server/QuietWealth.Backend/QuietWealth.Backend.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp --no-restore

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_PROD_API }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_PROD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_PROD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "prodquietwealth-api"
          slot-name: "Production"
          package: .
