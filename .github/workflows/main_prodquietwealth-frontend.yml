name: Build and deploy Production Frontend to Azure Web App - proddesarrolloprofesional-frontend

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install and build
        working-directory: app
        env:
          # Separate secret pointing to the prod API URL.
          # Add VITE_API_BASE_URL_PROD to GitHub → Settings → Environments → Production → Secrets.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL_PROD }}
        run: |
          npm ci
          npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: app/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # Add these secrets after provisioning the prod Azure Web App and
          # configuring its federated identity credential in Entra ID.
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_PROD_FRONTEND }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_PROD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_PROD }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'proddesarrolloprofesional-frontend'
          slot-name: 'Production'
          package: .
          startup-command: 'npx --yes serve -s . -l $PORT'
